server:
  port: 8081
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:h2:mem:webspeak;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    redis:
      host: localhost
      port: 6379
      # Disable Redis cache for demo
    elasticsearch:
      uris: http://localhost:9200

jwt:
  secret: webspeakSuperSecretKeyForJwtTokenGeneration2024Secure
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_dummy}
  key-secret: ${RAZORPAY_KEY_SECRET:dummy_secret}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:dummy_webhook}

frontend:
  url: http://localhost:5173

logging:
  level:
    com.webspeak: INFO
    org.springframework.security: WARN
